name: Auto Sync Fork

on:
  schedule:
    - cron: '0 17 * * *'  # 每天北京时间凌晨 1 点运行
  workflow_dispatch:       # 可以手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：获取你的仓库代码
      - name: Checkout
        uses: actions/checkout@v4
        
      # 步骤2：配置 Git
      - name: Setup Git
        run: |
          git config --global user.name 'Auto Sync Bot'
          git config --global user.email 'actions@github.com'
      
      # 步骤3：添加上游仓库并合并（只需修改这一行！）
      - name: Sync from Upstream
        run: |
          # 添加上游仓库地址（修改这里的 owner/repo）
          git remote add upstream https://github.com/201853910/VMwareWorkstation.git
          
          # 获取上游更新
          git fetch upstream
          
          # 合并到主分支（如果分支不是 main，改成你的分支名）
          git checkout main
          git merge upstream/main --no-edit
          
          # 推送到你的仓库
          git push origin main
