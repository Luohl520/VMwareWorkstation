name: Auto Sync Fork

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.1
        
      - name: Setup Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      
      - name: Detect and Sync
        run: |
          # 添加上游
          git remote add upstream https://github.com/201853910/VMwareWorkstation.git
          git fetch upstream
          
          # 检测上游默认分支
          UPSTREAM_DEFAULT=$(git remote show upstream | grep "HEAD branch" | cut -d ":" -f 2 | tr -d ' ')
          echo "上游默认分支是: $UPSTREAM_DEFAULT"
          
          # 切换到上游的分支（如果本地没有就创建）
          git checkout $UPSTREAM_DEFAULT || git checkout -b $UPSTREAM_DEFAULT
          
          # 合并
          git merge upstream/$UPSTREAM_DEFAULT --no-edit
          
          # 推送
          git push origin $UPSTREAM_DEFAULT
          
          echo "✅ 同步完成！"
