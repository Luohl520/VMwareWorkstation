name: Safe Sync Fork

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.1
        with:
          ref: master
          fetch-depth: 0  # 获取完整历史
        
      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
      - name: Merge with unrelated histories
        run: |
          # 添加上游
          git remote add upstream https://github.com/201853910/VMwareWorkstation.git || true
          git fetch upstream
          
          # 检查是否有共同的祖先
          COMMON_ANCESTOR=$(git merge-base master upstream/master 2>/dev/null || echo "none")
          
          if [ "$COMMON_ANCESTOR" = "none" ]; then
            echo "⚠️ 历史不相关，使用允许无关历史合并"
            git checkout master
            git merge upstream/master --allow-unrelated-histories --no-edit
          else
            echo "✅ 有共同历史，正常合并"
            git checkout master
            git merge upstream/master --no-edit
          fi
          
          # 推送更新
          git push origin master
          
          echo "✅ 同步成功！"
